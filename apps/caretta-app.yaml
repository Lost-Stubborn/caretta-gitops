apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caretta
  namespace: argocd

spec:
  project: default

  source: 
    repoURL: https://github.com/Lost-Stubborn/caretta-gitops.git
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values/caretta-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: caretta
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
    syncOptions: 
      - CreateNamespace=true