apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caretta
  namespace: argocd

spec:
  project: default

  source: 
    repoURL: https://helm.groundcover.com/
    chart: caretta
    targetRevision: "*"
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: caretta
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
    syncOptions: 
      - CreateNamespace=true