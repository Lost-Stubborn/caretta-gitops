apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caretta-observability
  namespace: argocd
spec:
  project: default
  source:
    path: apps/observability-addons
    repoURL: https://github.com/Lost-Stubborn/caretta-gitops.git
    targetRevision: HEAD
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true